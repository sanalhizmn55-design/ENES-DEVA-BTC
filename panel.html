<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENES DEVA BTC | Panel</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .header { background: #151515; padding: 15px; border-bottom: 2px solid #f39c12; display: flex; justify-content: space-between; align-items: center; }
        .bakiye-box { background: #1a1a1a; padding: 20px; border-radius: 15px; margin: 15px auto; max-width: 300px; border: 1px solid #f39c12; }
        #bakiye-goster { font-size: 32px; color: #f39c12; display: block; font-weight: bold; margin-top: 5px; }
        .btn-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .btn { border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1; max-width: 150px; }
        .yatir { background: #f39c12; color: #000; }
        .cek { background: #27ae60; color: #fff; }
        .chart-container { width: 100%; height: 400px; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
    </style>
</head>
<body onload="bakiyeGoster()">
    <div class="header">
        <span style="color:#f39c12; font-weight:bold;">ENES DEVA BTC</span>
        <button onclick="cikisYap()" style="background:#c0392b; color:white; border:none; padding:5px 10px; border-radius:5px;">Çıkış</button>
    </div>

    <div class="bakiye-box">
        <span style="color:#888; font-size:12px;">HESAP BAKİYESİ</span>
        <span id="bakiye-goster">$0.00</span>
    </div>

    <div class="btn-group">
        <button class="btn yatir" onclick="paraYatiritir()">PARA YATIR</button>
        <button class="btn cek" onclick="paraCek()">PARA ÇEK</button>
    </div>

    <div class="chart-container">
        <div id="tv-chart" style="height:100%;"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
            new TradingView.widget({ "autosize": true, "symbol": "BIST:DEVA", "interval": "D", "theme": "dark", "container_id": "tv-chart" });
        </script>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
