<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENES DEVA BTC | Panel</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .header { background: #151515; padding: 20px; border-bottom: 2px solid #f39c12; display: flex; justify-content: space-between; align-items: center; }
        .bakiye-box { background: #1a1a1a; padding: 20px; border-radius: 15px; margin: 20px auto; max-width: 300px; border: 1px solid #f39c12; }
        #bakiye-goster { font-size: 32px; color: #f39c12; display: block; font-weight: bold; }
        .chart-container { width: 100%; max-width: 900px; margin: 20px auto; height: 450px; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        button.exit { background: #c0392b; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-para-cek { background: #27ae60; color: white; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 20px; width: 80%; max-width: 300px; transition: 0.3s; }
        .btn-para-cek:hover { background: #2ecc71; transform: scale(1.05); }
    </style>
</head>
<body onload="bakiyeGoster()">
    <div class="header">
        <span style="color:#f39c12; font-weight:bold;">ENES DEVA BTC</span>
        <button class="exit" onclick="cikisYap()">Çıkış Yap</button>
    </div>

    <div class="bakiye-box">
        <span style="color:#888; font-size:14px;">GÜNCEL VARLIĞINIZ</span>
        <span id="bakiye-goster">$0.00</span>
    </div>

    <button class="btn-para-cek" onclick="paraCek()">PARA ÇEK (Min. $1000)</button>

    <div class="chart-container">
        <div id="tv-chart" style="height:100%;"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
            new TradingView.widget({
                "autosize": true, "symbol": "BIST:DEVA", "interval": "D", "theme": "dark", "style": "1", "locale": "tr", "container_id": "tv-chart"
            });
        </script>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
